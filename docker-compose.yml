version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: soc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soc_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: node:20-alpine
    container_name: soc-backend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-soc_management}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run db:init && npm run db:seed && npx tsc --outDir dist --skipLibCheck --noEmitOnError false; node dist/index.js"

  frontend:
    image: node:20-alpine
    container_name: soc-frontend
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_APP_NAME: ${VITE_APP_NAME:-SOC Management}
      VITE_API_BASE_URL: http://127.0.0.1:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data: